<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KALD 2016 Event Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#f4f7fb;color:#1b2a3a}



nav a{text-decoration:none;color:#0b4f8a;font-weight:700}
.hero{background:linear-gradient(135deg,#083d6b,#0b6fae);color:white;text-align:center;padding:55px 25px}
.actions{max-width:1150px;margin:25px auto;padding:0 25px}
.btn{display:inline-block;background:#0b4f8a;color:white;text-decoration:none;padding:12px 18px;border-radius:10px;font-weight:700;margin:6px 8px 6px 0}
.gallery{max-width:1150px;margin:auto;padding:10px 25px 45px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px}
.photo{background:white;border-radius:14px;box-shadow:0 4px 12px #0003;overflow:hidden}
.photo img{width:100%;height:220px;object-fit:cover;display:block}
.photo p{margin:0;padding:10px;text-align:center;font-weight:700;color:#0b4f8a}
footer{text-align:center;background:#102a43;color:white;padding:25px;margin-top:35px}
@media(max-width:760px){}nav{background:white;padding:14px 38px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 12px #0001;position:sticky;top:0;z-index:999}
.brand{display:flex;align-items:center;gap:12px;font-weight:800;color:#0b4f8a;text-decoration:none}
.brand img{height:52px}
.nav-links{display:flex;align-items:center;gap:18px;margin-left:auto}
.nav-links a{text-decoration:none;color:#0b4f8a;font-weight:700}
@media(max-width:760px){
nav{padding:12px 14px;flex-wrap:wrap}
.brand{width:100%;justify-content:center;margin-bottom:8px}
.nav-links{width:100%;justify-content:center;flex-wrap:wrap;gap:12px}
.nav-links a{font-size:14px}
}
</style>

  }
  .hero h1{
    font-size:26px !important;
    line-height:1.2 !important;
  }
  .hero p{
    font-size:15px !important;
  }
  .section,.actions,.gallery{
    padding:14px !important;
  }
  .grid{
    grid-template-columns:1fr !important;
  }
  .card{
    padding:18px !important;
  }
  table{
    display:block !important;
    overflow-x:auto !important;
    white-space:nowrap !important;
  }
  th,td{
    font-size:13px !important;
    padding:10px !important;
  }
  .gallery{
    grid-template-columns:repeat(2,1fr) !important;
    gap:10px !important;
  }
  .photo img{
    height:130px !important;
  }
  .viewer .topbar{
    top:8px !important;
    left:8px !important;
    right:8px !important;
    flex-direction:column !important;
    gap:8px !important;
    text-align:center !important;
  }
  .viewer button{
    padding:8px 10px !important;
    font-size:12px !important;
  }
  .viewer img{
    max-width:96% !important;
    max-height:68vh !important;
  }
  .viewer .prev{
    left:6px !important;
  }
  .viewer .next{
    right:6px !important;
  }
  .viewer .navbtn{
    font-size:22px !important;
  }
  input,select{
    width:100% !important;
    box-sizing:border-box !important;
  }
}
</style>
