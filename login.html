<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KALD Archive Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#083d6b,#0b6fae);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#1b2a3a}
.login{background:white;width:100%;max-width:420px;border-radius:22px;padding:35px;box-shadow:0 12px 35px #0004;text-align:center}
.login img{height:80px;margin-bottom:15px}
h1{color:#0b4f8a;margin:5px 0}
p{color:#526173}
input,select{width:100%;padding:14px;margin:10px 0;border:1px solid #ccd6e0;border-radius:12px;font-size:15px}
button{width:100%;background:#0b4f8a;color:white;border:0;border-radius:12px;padding:14px;font-weight:800;font-size:16px;margin-top:12px;cursor:pointer}
.back{display:block;margin-top:18px;color:#0b4f8a;text-decoration:none;font-weight:700}
.note{font-size:12px;margin-top:15px;color:#777}
</style>

<style id="mobile-fix">
@media (max-width: 768px){
  nav{
    padding:12px 14px !important;
    flex-direction:column !important;
    align-items:flex-start !important;
    gap:10px !important;
  }
  .brand{
    width:100% !important;
    font-size:16px !important;
  }
  .brand img{
    height:42px !important;
  }
  .nav-links{
    width:100% !important;
    display:flex !important;
    flex-wrap:wrap !important;
    gap:8px !important;
    margin-left:0 !important;
  }
  .nav-links a{
    background:#eef6fc !important;
    padding:8px 10px !important;
    border-radius:8px !important;
    font-size:13px !important;
  }
  .hero{
    padding:34px 16px !important;
  }
  .hero h1{
    font-size:26px !important;
    line-height:1.2 !important;
  }
  .hero p{
    font-size:15px !important;
  }
  .section,.actions,.gallery{
    padding:14px !important;
  }
  .grid{
    grid-template-columns:1fr !important;
  }
  .card{
    padding:18px !important;
  }
  table{
    display:block !important;
    overflow-x:auto !important;
    white-space:nowrap !important;
  }
  th,td{
    font-size:13px !important;
    padding:10px !important;
  }
  .gallery{
    grid-template-columns:repeat(2,1fr) !important;
    gap:10px !important;
  }
  .photo img{
    height:130px !important;
  }
  .viewer .topbar{
    top:8px !important;
    left:8px !important;
    right:8px !important;
    flex-direction:column !important;
    gap:8px !important;
    text-align:center !important;
  }
  .viewer button{
    padding:8px 10px !important;
    font-size:12px !important;
  }
  .viewer img{
    max-width:96% !important;
    max-height:68vh !important;
  }
  .viewer .prev{
    left:6px !important;
  }
  .viewer .next{
    right:6px !important;
  }
  .viewer .navbtn{
    font-size:22px !important;
  }
  input,select{
    width:100% !important;
    box-sizing:border-box !important;
  }
}
</style>





<style id="pro-mobile-header">
.menu-btn{
  display:none;
  background:#0b4f8a;
  color:white;
  border:0;
  border-radius:10px;
  padding:10px 14px;
  font-weight:800;
  cursor:pointer;
  margin-left:auto;
}
@media(max-width:768px){
  nav{
    padding:12px 14px!important;
    flex-direction:row!important;
    align-items:center!important;
    justify-content:space-between!important;
    flex-wrap:wrap!important;
  }
  .brand{
    width:auto!important;
    max-width:78%!important;
    font-size:16px!important;
    line-height:1.15!important;
  }
  .brand img{
    height:42px!important;
  }
  .menu-btn{
    display:block!important;
    width:auto!important;
    margin:0!important;
    font-size:14px!important;
  }
  .nav-links{
    display:none!important;
    width:100%!important;
    flex-direction:column!important;
    gap:8px!important;
    margin-left:0!important;
    margin-top:12px!important;
  }
  .nav-links.show{
    display:flex!important;
  }
  .nav-links a{
    width:100%!important;
    box-sizing:border-box!important;
    text-align:center!important;
    background:#eef6fc!important;
    padding:10px!important;
    border-radius:10px!important;
    font-size:14px!important;
  }
}
</style>


<style id="final-mobile-polish">
@media(max-width:768px){
  nav{
    padding:12px 14px!important;
    display:flex!important;
    flex-direction:row!important;
    align-items:center!important;
    justify-content:space-between!important;
    flex-wrap:wrap!important;
  }
  .brand{
    max-width:72%!important;
    gap:8px!important;
    font-size:14px!important;
    line-height:1.1!important;
  }
  .brand img{
    height:38px!important;
  }
  .brand span{
    white-space:normal!important;
    font-size:18px!important;
  }
  .menu-btn{
    display:block!important;
    margin:0!important;
    padding:10px 16px!important;
    border-radius:12px!important;
    background:#0b4f8a!important;
    color:white!important;
    font-weight:800!important;
    border:0!important;
  }
  .nav-links{
    display:none!important;
    width:100%!important;
    flex-direction:column!important;
    gap:7px!important;
    margin-top:12px!important;
    margin-left:0!important;
  }
  .nav-links.show{
    display:flex!important;
  }
  .nav-links a{
    width:100%!important;
    padding:9px!important;
    text-align:center!important;
    border-radius:10px!important;
    background:#eef6fc!important;
    box-sizing:border-box!important;
    font-size:14px!important;
  }
  .hero{
    padding:32px 18px!important;
  }
  .hero h1{
    font-size:32px!important;
    line-height:1.15!important;
  }
  .hero p{
    font-size:17px!important;
    line-height:1.35!important;
  }
}
</style>

</head>
<body>
<div class="login">
<img src="assets/logo.jpg">
<h1>KALD Archive Login</h1>
<p>Authorized access for archive management and review.</p>

<select id="role">
<option value="admin.html">Admin</option>
<option value="staff.html">Staff</option>
<option value="owner.html">Chair</option>
</select>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<a class="back" href="index.html">Back to Public Portal</a>
<div class="note">Demo interface only. Secure authentication will be connected later.</div>
</div>

<script>
function login(){
  const page=document.getElementById("role").value;
  window.location.href=page;
}
</script>




<script id="pro-menu-script">
function toggleMenu(){
  const nav=document.getElementById("navLinks");
  if(nav){nav.classList.toggle("show");}
}
</script>


<script id="final-mobile-menu-script">
function toggleMenu(){
  const nav=document.getElementById("navLinks");
  if(nav){nav.classList.toggle("show");}
}
</script>

</body>
</html>
