<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Chair Dashboard</title><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Segoe UI,Arial;background:#f4f7fb;color:#1b2a3a}
nav{background:white;padding:14px 38px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 12px #0001}
nav a{text-decoration:none;color:#0b4f8a;font-weight:700;margin-left:18px}
.hero{background:linear-gradient(135deg,#083d6b,#0b6fae);color:white;text-align:center;padding:55px 25px}
.grid{max-width:1100px;margin:40px auto;padding:0 25px;display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:22px}
.card{background:white;border-radius:18px;padding:28px;box-shadow:0 6px 20px #0002;border-top:5px solid #0b6fae;text-align:center}
.card h2{color:#0b4f8a;font-size:32px}
footer{text-align:center;background:#102a43;color:white;padding:25px;margin-top:45px}
</style>
<style id="mobile-fix">
@media (max-width: 768px){
  nav{
    padding:12px 14px !important;
    flex-direction:column !important;
    align-items:flex-start !important;
    gap:10px !important;
  }
  .brand{
    width:100% !important;
    font-size:16px !important;
  }
  .brand img{
    height:42px !important;
  }
  .nav-links{
    width:100% !important;
    display:flex !important;
    flex-wrap:wrap !important;
    gap:8px !important;
    margin-left:0 !important;
  }
  .nav-links a{
    background:#eef6fc !important;
    padding:8px 10px !important;
    border-radius:8px !important;
    font-size:13px !important;
  }
  .hero{
    padding:34px 16px !important;
  }
  .hero h1{
    font-size:26px !important;
    line-height:1.2 !important;
  }
  .hero p{
    font-size:15px !important;
  }
  .section,.actions,.gallery{
    padding:14px !important;
  }
  .grid{
    grid-template-columns:1fr !important;
  }
  .card{
    padding:18px !important;
  }
  table{
    display:block !important;
    overflow-x:auto !important;
    white-space:nowrap !important;
  }
  th,td{
    font-size:13px !important;
    padding:10px !important;
  }
  .gallery{
    grid-template-columns:repeat(2,1fr) !important;
    gap:10px !important;
  }
  .photo img{
    height:130px !important;
  }
  .viewer .topbar{
    top:8px !important;
    left:8px !important;
    right:8px !important;
    flex-direction:column !important;
    gap:8px !important;
    text-align:center !important;
  }
  .viewer button{
    padding:8px 10px !important;
    font-size:12px !important;
  }
  .viewer img{
    max-width:96% !important;
    max-height:68vh !important;
  }
  .viewer .prev{
    left:6px !important;
  }
  .viewer .next{
    right:6px !important;
  }
  .viewer .navbtn{
    font-size:22px !important;
  }
  input,select{
    width:100% !important;
    box-sizing:border-box !important;
  }
}
</style>

</head>
<body data-role="owner">
<nav><strong>KALD Chair</strong><div><a href="index.html">Public Portal</a><a href="#" onclick="logout()">Logout</a></div></nav>
<section class="hero"><h1>Chair Dashboard</h1><p>Executive overview of KALD Digital Archive status.</p></section>
<section class="grid">
<div class="card"><h2>805</h2><p>Total Archived Files</p></div>
<div class="card"><h2>789</h2><p>Photo Records</p></div>
<div class="card"><h2>11</h2><p>Video Records</p></div>
<div class="card"><h2>56.75GB</h2><p>Archive Size</p></div>
</section>
<footer>KALD Digital Archive | Chair Dashboard</footer>
<script>
const requiredRole = document.body.dataset.role;
const currentRole = localStorage.getItem("kaldRole");

if(requiredRole && currentRole !== requiredRole){
  alert("Please login first.");
  window.location.href = "login.html";
}

function logout(){
  localStorage.removeItem("kaldRole");
  window.location.href = "login.html";
}
</script>
</body></html>
